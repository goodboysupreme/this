# docker-compose for PlaceIQ — db + backend + frontend.
# NOTE: Docker is OPTIONAL. Local dev works fine without it
# (SQLite + `uvicorn app.main:app --reload`, see README.md).
# The frontend service is a placeholder until the Next.js app exists.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: placeiq
      POSTGRES_PASSWORD: placeiq
      POSTGRES_DB: placeiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://placeiq:placeiq@db:5432/placeiq
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

  # frontend:  # placeholder — enable once the Next.js app exists
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ./frontend:/app
  #   command: sh -c "npm install && npm run dev"
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
